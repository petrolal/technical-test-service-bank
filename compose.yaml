version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: caixa_db
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: banco_caixa
    ports:
      - "5432:5432"
    networks:
      - postgres-network
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_PASS: banco_01
      RABBITMQ_DEFAULT_USER: caixa_economica
    ports:
      - "5672:5672"
      - "15672:15672" # UI
    networks:
      - rabbit-network

volumes:
  pgdata:

networks:
  postgres-network:
    driver: bridge
  rabbit-network:
    driver: bridge